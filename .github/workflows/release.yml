name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read   # gh release download (node binaries) needs read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: AliceWallet-linux-x86_64.tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: AliceWallet-windows-x86_64.zip
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: AliceWallet-macos-arm64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libwayland-dev

      - name: Test (gui crate)
        working-directory: gui
        run: cargo test --target ${{ matrix.target }}

      - name: Build
        working-directory: gui
        run: cargo build --release --target ${{ matrix.target }}

      # ----------------------------------------------------------------------
      # Embedded-node bundling (the "bundle monerod" half).
      #
      # The all-in-one wallet manages a child `solochain-template-node`. The raw
      # chain spec is COMMITTED (gui/release-assets/alice-mainnet-raw.json) and is
      # the same on every OS — only the node BINARY differs per target. The
      # per-OS node binary is supplied either committed under
      # gui/release-assets/<target>/ or via the ALICE_NODE_BIN_URL secret (a
      # per-OS download URL — point it at the artifact from alice-chain's
      # node-release.yml matrix). Both are copied alongside the wallet so it can
      # launch a local node; the wallet resolves them as siblings of its own
      # executable (see gui/src/node.rs::resolve_node_binary / resolve_chain_spec).
      #
      # The spec is verified against the SHA-256 pinned in gui/src/node.rs
      # (ALICE_MAINNET_SPEC_SHA256) — a fail-closed gate so a wrong spec can NEVER
      # ship. If the node binary is absent the wallet still ships and works in
      # Remote-node mode (the Node page shows a clear "node binary not bundled"
      # notice); this keeps CI green before V supplies the per-OS node binaries.
      # ----------------------------------------------------------------------
      - name: Stage node binary + chain spec
        id: node_assets
        shell: bash
        env:
          # Node binaries live in a SAME-REPO release (node-bin-v0.1.0); gh pulls
          # them with this token, which works even while the repo is private.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALICE_NODE_REL_TAG: ${{ vars.ALICE_NODE_REL_TAG }}
        run: |
          set -euo pipefail
          mkdir -p node-stage
          have_node=0
          have_spec=0
          # 1) The canonical chain spec is committed and shared across all OSes.
          if [ -f "gui/release-assets/alice-mainnet-raw.json" ]; then
            cp -v gui/release-assets/alice-mainnet-raw.json node-stage/alice-mainnet-raw.json
          fi
          # 2) Per-OS node binary: committed assets take precedence (e.g. macOS
          #    ships its node committed under gui/release-assets/<target>/), else
          #    fetch the matching per-OS binary from alice-chain's node release.
          #    This glob ALSO stages the committed CPU miner (xmrig) when present
          #    (macOS arm64 ships it); the Package steps copy it beside the wallet
          #    per gui/src/node.rs::resolve_miner_binary. It is optional.
          if [ -d "gui/release-assets/${{ matrix.target }}" ]; then
            cp -v gui/release-assets/${{ matrix.target }}/* node-stage/ 2>/dev/null || true
          fi
          NODE_REL_TAG="${ALICE_NODE_REL_TAG:-node-bin-v0.1.0}"
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu) ASSET=solochain-template-node-linux-x86_64;      OUT=node-stage/solochain-template-node ;;
            x86_64-pc-windows-msvc)   ASSET=solochain-template-node-windows-x86_64.exe; OUT=node-stage/solochain-template-node.exe ;;
            aarch64-apple-darwin)     ASSET=solochain-template-node-macos-arm64;        OUT=node-stage/solochain-template-node ;;
            *) ASSET=""; OUT="" ;;
          esac
          # Fetch only if not already staged from a committed asset. Pulled from a
          # SAME-REPO release with gh (GITHUB_TOKEN auth → works while private).
          if [ -n "$ASSET" ] && [ ! -f node-stage/solochain-template-node ] && [ ! -f node-stage/solochain-template-node.exe ]; then
            echo "Fetching node binary $ASSET from release $NODE_REL_TAG…"
            gh release download "$NODE_REL_TAG" -R "$GITHUB_REPOSITORY" -p "$ASSET" -O "$OUT" --clobber || true
          fi
          if [ -f node-stage/solochain-template-node ] || [ -f node-stage/solochain-template-node.exe ]; then
            have_node=1
          fi
          if [ -f node-stage/alice-mainnet-raw.json ]; then
            have_spec=1
          fi
          echo "have_node=$have_node" >> "$GITHUB_OUTPUT"
          echo "have_spec=$have_spec" >> "$GITHUB_OUTPUT"
          echo "Node bundling: have_node=$have_node have_spec=$have_spec"

      # Fail-closed: a staged node binary MUST match the per-OS SHA-256 pinned
      # here (the wallet vouches for exactly this node build). Committed macOS
      # node and the fetched Linux/Windows binaries are all verified; a wrong or
      # tampered binary aborts the build so it can never be packaged.
      - name: Verify staged node binary SHA-256 == pinned
        if: steps.node_assets.outputs.have_node == '1'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu) PIN=2179fd0dd11474df3ab2558a53cb0ed2fb182d87c15b575ba972a0f4791ebeff; BIN=node-stage/solochain-template-node ;;
            x86_64-pc-windows-msvc)   PIN=4b59737a59b504fe93dc276d0397a00c89138ccfc1f74423d3d9ee174f0c34b9; BIN=node-stage/solochain-template-node.exe ;;
            aarch64-apple-darwin)     PIN=68e128bc3864393ba8cdeb71537300e66d5a10ebc35a112e922a2cc4f68e8a3b; BIN=node-stage/solochain-template-node ;;
            *) PIN=""; BIN="" ;;
          esac
          if [ -z "$PIN" ]; then echo "::error::no pinned node SHA for target ${{ matrix.target }}" >&2; exit 1; fi
          if command -v sha256sum >/dev/null 2>&1; then ACT=$(sha256sum "$BIN" | awk '{print $1}'); else ACT=$(shasum -a 256 "$BIN" | awk '{print $1}'); fi
          echo "pinned=$PIN"; echo "staged=$ACT"
          if [ "$PIN" != "$ACT" ]; then
            echo "::error::staged node binary SHA-256 ($ACT) != pinned ($PIN) — refusing to package" >&2
            exit 1
          fi
          echo "Node binary integrity OK (matches pin)."

      # Fail-closed: if a spec is staged it MUST hash to the pin baked into
      # gui/src/node.rs. A wrong/corrupted spec aborts the whole release build —
      # it can never be packaged. Skipped only when no spec is staged at all.
      - name: Verify staged chain spec SHA-256 == pinned
        if: steps.node_assets.outputs.have_spec == '1'
        shell: bash
        run: |
          set -euo pipefail
          PIN=$(grep -oE '"[0-9a-f]{64}"' gui/src/node.rs | head -1 | tr -d '"')
          if [ -z "$PIN" ]; then echo "could not read pinned spec SHA from node.rs" >&2; exit 1; fi
          if command -v sha256sum >/dev/null 2>&1; then
            ACT=$(sha256sum node-stage/alice-mainnet-raw.json | awk '{print $1}')
          else
            ACT=$(shasum -a 256 node-stage/alice-mainnet-raw.json | awk '{print $1}')
          fi
          echo "pinned=$PIN"
          echo "staged=$ACT"
          if [ "$PIN" != "$ACT" ]; then
            echo "::error::staged chain spec SHA-256 ($ACT) != pinned ($PIN) — refusing to package" >&2
            exit 1
          fi
          echo "Chain spec integrity OK (matches pin)."

      # ---------- Linux package ----------
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/AliceWallet
          cp gui/target/${{ matrix.target }}/release/gui dist/AliceWallet/AliceWallet
          chmod +x dist/AliceWallet/AliceWallet
          # Headless CLI wallet — same crate, built by the same `cargo build
          # --release` above (it builds every [[bin]]). Ships beside the GUI so a
          # server-side / SSH user can run the wallet with no display. Links zero
          # eframe/egui (verified via otool/nm), so it works on headless Linux.
          cp gui/target/${{ matrix.target }}/release/alice-wallet-cli dist/AliceWallet/alice-wallet-cli
          chmod +x dist/AliceWallet/alice-wallet-cli
          cp gui/assets/brand/alice-logo.svg dist/AliceWallet/
          # Embedded node (optional) — sibling layout per gui/src/node.rs.
          if [ -f node-stage/solochain-template-node ]; then
            cp node-stage/solochain-template-node dist/AliceWallet/
            chmod +x dist/AliceWallet/solochain-template-node
          fi
          if [ -f node-stage/alice-mainnet-raw.json ]; then
            cp node-stage/alice-mainnet-raw.json dist/AliceWallet/
          fi
          # Bundled CPU miner (XMRig), optional — sibling layout per
          # gui/src/node.rs::resolve_miner_binary. TODO(linux): supply a Linux
          # xmrig under gui/release-assets/<target>/ (macOS arm64 ships it now).
          if [ -f node-stage/xmrig ]; then
            cp node-stage/xmrig dist/AliceWallet/
            chmod +x dist/AliceWallet/xmrig
          fi
          cat > dist/AliceWallet/AliceWallet.desktop <<EOF
          [Desktop Entry]
          Name=Alice Wallet
          Exec=AliceWallet
          Icon=alice-logo
          Type=Application
          Categories=Finance;
          EOF
          cat > dist/AliceWallet/run.sh <<'EOF'
          #!/usr/bin/env bash
          cd "$(dirname "$0")" && ./AliceWallet
          EOF
          chmod +x dist/AliceWallet/run.sh
          tar -czf ${{ matrix.artifact }} -C dist AliceWallet

      # ---------- Windows package ----------
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/AliceWallet | Out-Null
          Copy-Item gui/target/${{ matrix.target }}/release/gui.exe dist/AliceWallet/AliceWallet.exe
          # Headless CLI wallet (same crate / same release build). Ships beside the GUI.
          Copy-Item gui/target/${{ matrix.target }}/release/alice-wallet-cli.exe dist/AliceWallet/alice-wallet-cli.exe
          Copy-Item gui/assets/brand/alice-logo.svg dist/AliceWallet/
          # Embedded node (optional) — sibling layout per gui/src/node.rs.
          if (Test-Path node-stage/solochain-template-node.exe) {
            Copy-Item node-stage/solochain-template-node.exe dist/AliceWallet/
          }
          if (Test-Path node-stage/alice-mainnet-raw.json) {
            Copy-Item node-stage/alice-mainnet-raw.json dist/AliceWallet/
          }
          # Bundled CPU miner (XMRig), optional — sibling layout per
          # gui/src/node.rs::resolve_miner_binary. TODO(windows): supply a
          # Windows xmrig.exe under gui/release-assets/<target>/.
          if (Test-Path node-stage/xmrig.exe) {
            Copy-Item node-stage/xmrig.exe dist/AliceWallet/
          }
          Compress-Archive -Path dist/AliceWallet -DestinationPath ${{ matrix.artifact }}

      # ---------- macOS .app ----------
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          APP="dist/AliceWallet.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp gui/target/${{ matrix.target }}/release/gui "$APP/Contents/MacOS/AliceWallet"
          chmod +x "$APP/Contents/MacOS/AliceWallet"
          # Headless CLI wallet (same crate / same release build) beside the GUI
          # in MacOS/. Codesigned as a nested binary below, before the bundle sign.
          cp gui/target/${{ matrix.target }}/release/alice-wallet-cli "$APP/Contents/MacOS/alice-wallet-cli"
          chmod +x "$APP/Contents/MacOS/alice-wallet-cli"
          cp gui/assets/brand/alice-logo.svg "$APP/Contents/Resources/"
          # Embedded node (optional): binary beside the wallet in MacOS/, spec
          # in Resources/ — matches gui/src/node.rs resolution candidates.
          if [ -f node-stage/solochain-template-node ]; then
            cp node-stage/solochain-template-node "$APP/Contents/MacOS/"
            chmod +x "$APP/Contents/MacOS/solochain-template-node"
          fi
          if [ -f node-stage/alice-mainnet-raw.json ]; then
            cp node-stage/alice-mainnet-raw.json "$APP/Contents/Resources/"
          fi
          # Bundled CPU miner (XMRig) beside the wallet in MacOS/ (optional) —
          # matches gui/src/node.rs::resolve_miner_binary. macOS arm64 ships it
          # committed under gui/release-assets/<target>/xmrig.
          if [ -f node-stage/xmrig ]; then
            cp node-stage/xmrig "$APP/Contents/MacOS/"
            chmod +x "$APP/Contents/MacOS/xmrig"
          fi
          # Read version from Cargo.toml so the bundle never drifts from the crate.
          VER=$(grep -m1 '^version' gui/Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')
          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Alice Wallet</string>
            <key>CFBundleDisplayName</key><string>Alice Wallet</string>
            <key>CFBundleIdentifier</key><string>org.aliceprotocol.wallet</string>
            <key>CFBundleVersion</key><string>${VER}</string>
            <key>CFBundleShortVersionString</key><string>${VER}</string>
            <key>CFBundleExecutable</key><string>AliceWallet</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF
          # Sign nested binaries first (CLI + node + miner, if present), then the bundle.
          if [ -f "$APP/Contents/MacOS/alice-wallet-cli" ]; then
            codesign --force -s - "$APP/Contents/MacOS/alice-wallet-cli" || true
          fi
          if [ -f "$APP/Contents/MacOS/solochain-template-node" ]; then
            codesign --force -s - "$APP/Contents/MacOS/solochain-template-node" || true
          fi
          if [ -f "$APP/Contents/MacOS/xmrig" ]; then
            codesign --force -s - "$APP/Contents/MacOS/xmrig" || true
          fi
          codesign --force --deep -s - "$APP" || true
          ditto -c -k --keepParent "$APP" ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # NOTE: There is intentionally NO "release" / "Create Release" job.
  # The release manifest (latest.json) and SHA256SUMS are signed OFFLINE with the
  # project's ed25519 release key, which never touches CI (see README "Releasing"
  # and gui/scripts/release.sh). CI's job ends at building + uploading per-OS
  # artifacts; a maintainer downloads them, signs locally, and publishes the
  # GitHub release by hand. This keeps the signing key offline and removes any
  # chance of an unsigned/auto-generated release clobbering a signed one.
